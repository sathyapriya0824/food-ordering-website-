<body>

    <header class="restaurant-header">
        <div class="header-content">
            <div class="logo">
                <!-- Replace this src with the path to your actual logo file, e.g. "logo.png" -->
                <img src="logo.jpeg" alt="Spice Street Restaurant Logo" onerror="this.parentElement.innerHTML='🍛'; this.parentElement.style.fontSize='2.2rem';">
            </div>
            <div class="header-text">
                <h1>Spice Street Restaurant</h1>
                <p>Delicious Food • Fast Delivery</p>
            </div>
        </div>
    </header>

    <main>
        <div class="order-layout">
            <!-- Menu Section -->
            <div class="panel">
                <div class="panel-header">
                    <h2>🍽️ Food Menu</h2>
                </div>
                <div class="menu-grid" id="menuGrid">
                    <!-- Cards will be added by JavaScript -->
                </div>
                <div class="running-total">
                    <span>Running Total (<span id="itemCount">0</span> item(s))</span>
                    <span id="runningTotalAmount">₹0</span>
                </div>
            </div>

            <!-- Customer Details -->
            <div class="panel">
                <div class="panel-header">
                    <h2>Customer Details</h2>
                </div>
                <form class="customer-form" id="orderForm">
                    <label>Name <input type="text" id="name" required></label>
                    <label>Mobile Number <input type="tel" id="mobile" maxlength="10" required></label>
                    <label>Address <textarea id="address" rows="4" required></textarea></label>
                    <label>Special Instructions (optional) <textarea id="instructions" rows="2" placeholder="e.g. less spicy, no onions, ring the bell"></textarea></label>
                    <button type="button" onclick="placeOrder()">Place Order</button>
                </form>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="panel summary-panel" id="summaryPanel">
            <h2>📋 Order Summary</h2>
            <div class="order-meta">
                <span><strong>Order ID:</strong> <span id="orderId"></span></span>
                <span><strong>Estimated Delivery:</strong> <span id="deliveryTime"></span></span>
            </div>
            <div id="summaryContent"></div>
            <div class="grand-total" id="grandTotal">Grand Total = ₹0</div>
            <div class="thank-you">🎉 Thank You for Ordering!</div>
            <button class="print-btn" onclick="window.print()">🖨️ Print / Save Receipt</button>
        </div>
    </main>

    <script>
        const menuItems = [
            { id: "burger", name: "Burger", price: 120, img: "burger.jpg" },
            { id: "pizza", name: "Pizza", price: 250, img: "pizza.jpg" },
            { id: "sandwich", name: "Sandwich", price: 90, img: "sandwich.jpg" },
            { id: "fries", name: "Fries", price: 80, img: "fries.webp" },
            { id: "juice", name: "Juice", price: 60, img: "juice.avif" }
        ];

        function createMenuCards() {
            const container = document.getElementById("menuGrid");
            container.innerHTML = "";

            menuItems.forEach(item => {
                const cardHTML = `
                    <div class="menu-card">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="card-body">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">₹${item.price}</div>
                            <div class="item-controls">
                                <label>
                                    <input type="checkbox" id="check-${item.id}" data-id="${item.id}">
                                    Select
                                </label>
                                <input type="number" id="qty-${item.id}" min="1" value="1" disabled>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });

            document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const qtyInput = document.getElementById(`qty-${this.dataset.id}`);
                    qtyInput.disabled = !this.checked;
                    if (!this.checked) qtyInput.value = 1;
                    updateRunningTotal();
                });
            });

            document.querySelectorAll('input[type="number"]').forEach(qtyInput => {
                qtyInput.addEventListener('input', updateRunningTotal);
            });
        }

        function updateRunningTotal() {
            let total = 0;
            let count = 0;

            menuItems.forEach(item => {
                const checked = document.getElementById(`check-${item.id}`).checked;
                if (checked) {
                    const qty = parseInt(document.getElementById(`qty-${item.id}`).value) || 1;
                    total += item.price * qty;
                    count += qty;
                }
            });

            document.getElementById("itemCount").textContent = count;
            document.getElementById("runningTotalAmount").textContent = `₹${total}`;
        }

        function placeOrder() {
            const name = document.getElementById("name").value.trim();
            const mobile = document.getElementById("mobile").value.trim();
            const address = document.getElementById("address").value.trim();
            const instructions = document.getElementById("instructions").value.trim();

            if (!name || !mobile || !address) {
                alert("Please fill all customer details!");
                return;
            }
            if (mobile.length !== 10 || isNaN(mobile)) {
                alert("Please enter a valid 10-digit mobile number!");
                return;
            }

            let summaryHTML = `<p><strong>Customer:</strong> ${name}</p>`;
            summaryHTML += `<p><strong>Mobile:</strong> ${mobile}</p>`;
            summaryHTML += `<p><strong>Address:</strong> ${address}</p>`;
            if (instructions) {
                summaryHTML += `<p><strong>Instructions:</strong> ${instructions}</p>`;
            }
            let grandTotal = 0;
            let hasItem = false;

            menuItems.forEach(item => {
                const checked = document.getElementById(`check-${item.id}`).checked;
                if (checked) {
                    hasItem = true;
                    const qty = parseInt(document.getElementById(`qty-${item.id}`).value) || 1;
                    const subtotal = item.price * qty;
                    grandTotal += subtotal;
                    summaryHTML += `<div class="summary-row"><span>${item.name} × ${qty}</span><span>₹${subtotal}</span></div>`;
                }
            });

            if (!hasItem) {
                alert("Please select at least one item!");
                return;
            }

            // Generate a simple order ID and an estimated delivery window
            const orderId = "SS" + Date.now().toString().slice(-6);
            const now = new Date();
            const deliveryStart = new Date(now.getTime() + 30 * 60000);
            const deliveryEnd = new Date(now.getTime() + 45 * 60000);
            const formatTime = d => d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            document.getElementById("orderId").textContent = orderId;
            document.getElementById("deliveryTime").textContent = `${formatTime(deliveryStart)} - ${formatTime(deliveryEnd)}`;
            document.getElementById("summaryContent").innerHTML = summaryHTML;
            document.getElementById("grandTotal").innerHTML = `Grand Total = ₹${grandTotal}`;
            document.getElementById("summaryPanel").classList.add("show");
            document.getElementById("summaryPanel").scrollIntoView({ behavior: "smooth" });
        }

        window.onload = createMenuCards;
    </script>
</body>
</html>
